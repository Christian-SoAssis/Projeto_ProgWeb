<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;family=DM+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1a9878",
                        "surface": "#d0ccdc",
                        "surface-light": "#f4f0ff",
                        "surface-shadow": "#aca8b8",
                        "mint": "#1a9878"
                    },
                    fontFamily: {
                        "sans": ["DM Sans", "sans-serif"],
                        "mono": ["DM Mono", "monospace"]
                    },
                    borderRadius: {
                        "lg": "1rem",
                        "xl": "1.5rem"
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #d0ccdc;
            font-family: 'DM Sans', sans-serif;
            color: #3d4944;
        }

        .neo-elevated {
            box-shadow: -6px -6px 14px #f4f0ff, 6px 6px 14px #aca8b8;
        }

        .neo-inset {
            box-shadow: inset -6px -6px 14px #f4f0ff, inset 6px 6px 14px #aca8b8;
        }

        .neo-inset-sm {
            box-shadow: inset -4px -4px 10px #f4f0ff, inset 4px 4px 10px #aca8b8;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* ── Cores fixas por categoria de serviço ── */
        :root {
          --c-hidro:       #2e7bc4;
          --c-hidro-l:     rgba(46,123,196,.14);
          --c-hidro-tx:    #2e7bc4;

          --c-eletro:      #d4a00a;
          --c-eletro-l:    rgba(212,160,10,.14);
          --c-eletro-tx:   #c49000;

          --c-gas:         #e06820;
          --c-gas-l:       rgba(224,104,32,.14);
          --c-gas-tx:      #d05810;

          --c-civil:       #b04020;
          --c-civil-l:     rgba(176,64,32,.14);
          --c-civil-tx:    #a03818;

          --c-verde:       #2a8c50;
          --c-verde-l:     rgba(42,140,80,.14);
          --c-verde-tx:    #268848;

          --c-limpeza:     #18a0a0;
          --c-limpeza-l:   rgba(24,160,160,.14);
          --c-limpeza-tx:  #148888;

          --c-pintura:     #9050c0;
          --c-pintura-l:   rgba(144,80,192,.14);
          --c-pintura-tx:  #8840b8;

          --c-marcen:      #8a5c28;
          --c-marcen-l:    rgba(138,92,40,.14);
          --c-marcen-tx:   #7a4e20;

          --c-frio:        #4898d8;
          --c-frio-l:      rgba(72,152,216,.14);
          --c-frio-tx:     #3888c8;

          --c-seg:         #384880;
          --c-seg-l:       rgba(56,72,128,.14);
          --c-seg-tx:      #304070;

          --c-tec:         #20a870;
          --c-tec-l:       rgba(32,168,112,.14);
          --c-tec-tx:      #189860;

          --c-refor:       #c06840;
          --c-refor-l:     rgba(192,104,64,.14);
          --c-refor-tx:    #b05830;

          --c-saude:       #d04080;
          --c-saude-l:     rgba(208,64,128,.14);
          --c-saude-tx:    #c03070;

          --c-jur:         #485870;
          --c-jur-l:       rgba(72,88,112,.14);
          --c-jur-tx:      #405068;

          --c-edu:         #e08820;
          --c-edu-l:       rgba(224,136,32,.14);
          --c-edu-tx:      #d07810;

          --c-pet:         #d85020;
          --c-pet-l:       rgba(216,80,32,.14);
          --c-pet-tx:      #c84818;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen pb-32">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-[#d0ccdc] flex items-center justify-between px-6 py-4 w-full z-50 shadow-[-6px_-6px_14px_#f4f0ff,6px_6px_14px_#aca8b8]">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-10 h-10 rounded-full neo-elevated active:shadow-[inset_-6px_-6px_14px_#f4f0ff,inset_6px_6px_14px_#aca8b8] transition-all">
<span class="material-symbols-outlined text-[#1a9878]">arrow_back</span>
</button>
<h1 class="font-['DM_Sans'] font-bold text-lg tracking-tight text-[#1a9878]">ServiçoJá</h1>
</div>
<div class="text-[#aca8b8] font-mono text-xs">REF: #SJ-2024</div>
</header>
<main class="max-w-md mx-auto px-6 pt-8 space-y-10">
<!-- Stepper Neomórfico -->
<section class="flex items-center justify-between relative px-4">
<!-- Background Line (Inset) -->
<div class="absolute top-1/2 left-0 w-full h-2 neo-inset rounded-full -translate-y-1/2 -z-10"></div>
<!-- Step 1 (Completed) -->
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full neo-elevated bg-primary flex items-center justify-center border-4 border-[#d0ccdc]">
<span class="material-symbols-outlined text-white text-xl" style="font-variation-settings: 'wght' 700;">check</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-wider text-primary">Serviço</span>
</div>
<!-- Step 2 (Active) -->
<div class="flex flex-col items-center gap-2">
<div class="w-12 h-12 rounded-full neo-elevated flex items-center justify-center bg-[#d0ccdc]">
<div class="w-4 h-4 rounded-full bg-primary shadow-[0_0_10px_#1a9878]"></div>
</div>
<span class="text-[10px] font-bold uppercase tracking-wider text-primary">Detalhes</span>
</div>
<!-- Step 3 (Inactive) -->
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full neo-inset flex items-center justify-center">
<div class="w-3 h-3 rounded-full bg-[#aca8b8]"></div>
</div>
<span class="text-[10px] font-bold uppercase tracking-wider text-[#aca8b8]">Revisão</span>
</div>
</section>
<!-- Form Section -->
<section class="space-y-6">
<div class="space-y-3">
<label class="font-bold text-sm tracking-tight px-2 text-[#3d4944]">Descreva o que você precisa</label>
<div class="neo-inset rounded-xl p-4 min-h-[160px] flex">
<textarea class="bg-transparent border-none focus:ring-0 w-full resize-none font-sans text-sm text-[#3d4944] placeholder-[#aca8b8]" placeholder="Ex: Preciso de uma limpeza profunda em um apartamento de 2 quartos, incluindo janelas e varanda..."></textarea>
</div>
</div>
<div class="space-y-3">
<label class="font-bold text-sm tracking-tight px-2 text-[#3d4944]">Fotos ou Referências</label>
<div class="neo-inset rounded-xl p-8 flex flex-col items-center justify-center border-2 border-dashed border-[#aca8b8]/20 gap-3 group cursor-pointer transition-all active:scale-[0.98]">
<div class="w-12 h-12 rounded-full neo-elevated flex items-center justify-center group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-[#1a9878]">cloud_upload</span>
</div>
<span class="text-xs font-bold uppercase tracking-widest text-[#1a9878]">Upload de arquivos</span>
<span class="text-[10px] font-mono text-[#aca8b8]">PNG, JPG até 10MB</span>
</div>
</div>
</section>
<!-- IA Analysis Card -->
<section class="neo-elevated rounded-xl overflow-hidden bg-[#d0ccdc] space-y-6">
<div style="height:3px;background:var(--c-limpeza)"></div>
<div class="p-6 pt-2 space-y-6">
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="p-2 neo-inset-sm rounded-lg">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<span class="font-mono text-xs font-medium text-[#1a9878]">IA analisando seu pedido...</span>
</div>
<span class="font-mono text-[10px] text-[#aca8b8]">85%</span>
</div>
<!-- Neomorphic Progress Bar -->
<div class="h-4 w-full neo-inset-sm rounded-full overflow-hidden p-1">
<div class="h-full bg-primary rounded-full shadow-[0_0_12px_#1a9878]" style="width: 85%"></div>
</div>
<!-- Category Badges -->
<div class="flex flex-wrap gap-3">
<div class="px-3 py-2 neo-inset-sm rounded-lg flex items-center gap-2" style="background:var(--c-limpeza-l);color:var(--c-limpeza-tx)">
<span class="material-symbols-outlined text-[14px]">category</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Limpeza</span>
</div>
<div class="px-3 py-2 neo-elevated rounded-lg flex items-center gap-2">
<span class="material-symbols-outlined text-[14px] text-primary">priority_high</span>
<span class="text-[10px] font-bold uppercase tracking-wider text-primary">Urgente</span>
</div>
<div class="px-3 py-2 neo-elevated rounded-lg flex items-center gap-2">
<span class="material-symbols-outlined text-[14px] text-primary">home</span>
<span class="text-[10px] font-bold uppercase tracking-wider text-primary">Residencial</span>
</div>
</div>
</section>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full py-5 rounded-xl bg-primary neo-elevated active:shadow-[inset_-6px_-6px_14px_#00513e,inset_6px_6px_14px_#008467] active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<span class="text-white font-bold uppercase tracking-[0.2em] text-sm">Continuar</span>
<span class="material-symbols-outlined text-white">chevron_right</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-8 pt-4 bg-[#d0ccdc] z-50 rounded-t-[2rem] shadow-[-6px_-20px_28px_#aca8b8]">
<div class="flex flex-col items-center justify-center text-[#aca8b8] p-2 hover:text-[#1a9878] transition-colors">
<span class="material-symbols-outlined">home</span>
<span class="font-['DM_Sans'] text-[10px] font-medium uppercase tracking-wider mt-1">Início</span>
</div>
<div class="flex flex-col items-center justify-center text-[#aca8b8] p-2 hover:text-[#1a9878] transition-colors">
<span class="material-symbols-outlined">search</span>
<span class="font-['DM_Sans'] text-[10px] font-medium uppercase tracking-wider mt-1">Busca</span>
</div>
<div class="flex flex-col items-center justify-center text-[#1a9878] shadow-[inset_-4px_-4px_10px_#f4f0ff,inset_4px_4px_10px_#aca8b8] rounded-xl p-3 px-5">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
<span class="font-['DM_Sans'] text-[10px] font-medium uppercase tracking-wider mt-1">Pedidos</span>
</div>
<div class="flex flex-col items-center justify-center text-[#aca8b8] p-2 hover:text-[#1a9878] transition-colors">
<span class="material-symbols-outlined">person</span>
<span class="font-['DM_Sans'] text-[10px] font-medium uppercase tracking-wider mt-1">Perfil</span>
</div>
</nav>
</body></html>
