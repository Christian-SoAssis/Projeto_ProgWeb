<style>
      body {

        color: #5a5666;
      }
      .neomorph-elevated {
        box-shadow: -6px -6px 14px #fcf8ff, 6px 6px 14px #aca8b8;

      .neomorph-inset {
        box-shadow: inset -6px -6px 14px #fcf8ff, inset 6px 6px 14px #aca8b8;

        box-shadow: -4px -4px 10px #fcf8ff, 4px 4px 10px #aca8b8;

      }

    body {
      min-height: max(884px, 100dvh);

<body class="font-body antialiased min-h-screen pb-32">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-[#d0ccdc] dark:bg-[#1a1a1e] flex items-center justify-between px-6 py-4 shadow-[-6px_-6px_14px_#fcf8ff,6px_6px_14px_#aca8b8] dark:shadow-none">

</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg text-[#1a9878] dark:text-[#1a9878]">Appearance</h1>
</div>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</header>
<main class="max-w-md mx-auto px-6 pt-8 space-y-8">

<section class="space-y-4">
<h2 class="text-sm font-bold uppercase tracking-wider text-[#5a5666] opacity-70 px-2">Visualização</h2>

<div class="relative z-10 flex flex-col items-center gap-2">
<div class="w-24 h-3 rounded-full neomorph-elevated bg-[#d0ccdc]"></div>
<div class="w-16 h-2 rounded-full neomorph-inset bg-[#d0ccdc]"></div>
<div class="mt-2 w-10 h-10 rounded-full bg-[#1a9878] neomorph-elevated flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xs">done</span>
</div>
</div>
</div>
</div>
</section>
<!-- Theme Selection Segmented Control -->

<h2 class="text-sm font-bold uppercase tracking-wider text-[#5a5666] opacity-70 px-2">Tema do Aplicativo</h2>
<div class="flex p-2 rounded-xl neomorph-inset bg-[#d0ccdc] gap-2">
<button class="flex-1 py-3 rounded-lg text-sm font-bold text-[#1a9878] neomorph-elevated bg-[#d0ccdc] transition-all transform scale-95">
                    Claro
                </button>
<button class="flex-1 py-3 rounded-lg text-sm font-medium text-[#5a5666] hover:opacity-80 transition-opacity">
                    Escuro
                </button>
<button class="flex-1 py-3 rounded-lg text-sm font-medium text-[#5a5666] hover:opacity-80 transition-opacity">
                    Sistema
                </button>
</div>
</section>
<!-- Toggles -->

<h2 class="text-sm font-bold uppercase tracking-wider text-[#5a5666] opacity-70 px-2">Configurações Rápidas</h2>
<div class="flex items-center justify-between px-2">
<span class="font-medium text-[#5a5666]">Modo Noturno</span>
<div class="w-14 h-7 rounded-full neomorph-inset bg-[#d0ccdc] p-1 flex items-center transition-all">
<div class="w-5 h-5 rounded-full bg-[#d0ccdc] neomorph-elevated-sm shadow-[0_0_8px_#1a9878]"></div>
</div>
</div>
<div class="flex items-center justify-between px-2">
<span class="font-medium text-[#5a5666]">Cores Vivas</span>

<div class="w-5 h-5 rounded-full bg-[#d0ccdc] neomorph-elevated-sm shadow-[0_0_12px_#1a9878] flex items-center justify-center">
<div class="w-2 h-2 rounded-full bg-[#1a9878]"></div>
</div>
</div>
</div>
<div class="flex items-center justify-between px-2">
<span class="font-medium text-[#5a5666]">Animações</span>
<div class="w-14 h-7 rounded-full neomorph-inset bg-[#d0ccdc] p-1 flex items-center justify-end transition-all">
<div class="w-5 h-5 rounded-full bg-[#d0ccdc] neomorph-elevated-sm shadow-[0_0_12px_#1a9878] flex items-center justify-center">
<div class="w-2 h-2 rounded-full bg-[#1a9878]"></div>
</div>
</div>
</div>
</section>
<!-- Action Rows -->

<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#1a9878]">format_size</span>

</div>
<div class="w-8 h-8 rounded-full neomorph-elevated-sm flex items-center justify-center text-[#1a9878]">
<span class="material-symbols-outlined text-sm">chevron_right</span>
</div>
</button>
<button class="w-full flex items-center justify-between p-5 rounded-xl neomorph-elevated bg-[#d0ccdc] hover:scale-[1.01] transition-transform active:shadow-[inset_-4px_-4px_10px_#fcf8ff,inset_4px_4px_10px_#aca8b8]">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#1a9878]">language</span>
<span class="font-medium">Idioma</span>
</div>
<div class="w-8 h-8 rounded-full neomorph-elevated-sm flex items-center justify-center text-[#1a9878]">
<span class="material-symbols-outlined text-sm">chevron_right</span>
</div>
</button>
<button class="w-full flex items-center justify-between p-5 rounded-xl neomorph-elevated bg-[#d0ccdc] hover:scale-[1.01] transition-transform active:shadow-[inset_-4px_-4px_10px_#fcf8ff,inset_4px_4px_10px_#aca8b8]">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#1a9878]">accessibility_new</span>

</div>
<div class="w-8 h-8 rounded-full neomorph-elevated-sm flex items-center justify-center text-[#1a9878]">
<span class="material-symbols-outlined text-sm">chevron_right</span>
</div>
</button>
</section>

<button class="w-full py-4 rounded-xl neomorph-elevated bg-[#d0ccdc] font-bold text-[#b04020] hover:opacity-80 active:scale-95 transition-all">

<span class="material-symbols-outlined" data-icon="build">build</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-medium">Services</span>
</div>
<div class="flex flex-col items-center justify-center text-[#1a9878] shadow-[inset_-4px_-4px_8px_#fcf8ff,inset_4px_4px_8px_#aca8b8] rounded-xl p-2 scale-90 duration-150">

</div>
<div class="flex flex-col items-center justify-center text-[#5a5666] dark:text-[#a0a0a8] p-2 hover:scale-105 transition-transform">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-medium">Profile</span>
</div>
</nav>
