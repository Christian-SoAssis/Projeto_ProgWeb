<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ServiçoJá - Plataforma de Serviços</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;family=DM+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            background-color: #d0ccdc;
            font-family: 'DM Sans', sans-serif;
            color: #1b1a26;
        }
        .neo-elevated {
            box-shadow: -6px -6px 14px #f4f0ff, 6px 6px 14px #aca8b8;
        }
        .neo-inset {
            box-shadow: inset -6px -6px 14px #f4f0ff, inset 6px 6px 14px #aca8b8;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="p-8">
<div class="max-w-4xl mx-auto space-y-12">
<header class="flex justify-between items-center">
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-primary rounded-2xl flex items-center justify-center neo-elevated">
<span class="material-symbols-outlined text-white text-2xl" data-icon="bolt">bolt</span>
</div>
<h1 class="text-2xl font-bold font-headline">ServiçoJá Platform</h1>
</div>
<div class="flex gap-4">
<button class="px-6 py-2 rounded-xl neo-elevated font-bold text-sm text-primary">Painel</button>
<button class="w-10 h-10 rounded-full neo-elevated flex items-center justify-center overflow-hidden border-2 border-white">
<img class="w-full h-full object-cover" src="https://images.unsplash.com/photo-1595841696677-542036735626?auto=format&amp;fit=crop&amp;q=80&amp;w=150"/>
</button>
</div>
</header>
<main class="grid grid-cols-1 md:grid-cols-3 gap-8">
<section class="md:col-span-2 space-y-8">
<div class="p-8 rounded-3xl neo-elevated bg-[#d0ccdc] space-y-6">
<h2 class="text-xl font-bold">Resumo Geral</h2>
<div class="grid grid-cols-3 gap-6">
<div class="neo-inset p-4 rounded-2xl text-center">
<span class="block text-2xl font-bold text-primary">124</span>
<span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Serviços</span>
</div>
<div class="neo-inset p-4 rounded-2xl text-center">
<span class="block text-2xl font-bold text-slate-700">4.9</span>
<span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Avaliação</span>
</div>
<div class="neo-inset p-4 rounded-2xl text-center">
<span class="block text-2xl font-bold text-slate-700">98%</span>
<span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Resposta</span>
</div>
</div>
</div>
</section>
<aside class="space-y-8">
<div class="p-6 rounded-3xl neo-elevated bg-[#d0ccdc] space-y-4">
<h3 class="font-bold">Ações Rápidas</h3>
<button class="w-full py-3 rounded-xl neo-elevated bg-primary text-white font-bold text-sm active:scale-95 transition-transform">Novo Serviço</button>
<button class="w-full py-3 rounded-xl neo-elevated text-slate-600 font-bold text-sm">Relatórios</button>
</div>
</aside>
</main>
</div>
</body></html>
