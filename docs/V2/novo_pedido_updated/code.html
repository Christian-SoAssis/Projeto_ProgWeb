<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ServiçoJá - Novo Pedido</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;family=DM+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            background-color: #d0ccdc;
            font-family: 'DM Sans', sans-serif;
            color: #1b1a26;
        }
        .neo-elevated { box-shadow: -6px -6px 14px #f4f0ff, 6px 6px 14px #aca8b8; }
        .neo-inset { box-shadow: inset -6px -6px 14px #f4f0ff, inset 6px 6px 14px #aca8b8; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        :root {
          --c-hidro:       #2e7bc4;
          --c-hidro-l:     rgba(46,123,196,.14);
          --c-hidro-tx:    #2e7bc4;
          --c-eletro:      #d4a00a;
          --c-eletro-l:    rgba(212,160,10,.14);
          --c-eletro-tx:   #c49000;
        }
    </style>
</head>
<body class="p-6">
    <div class="max-w-[480px] mx-auto space-y-8">
        <header class="flex items-center gap-4">
            <button class="w-10 h-10 rounded-xl neo-elevated flex items-center justify-center">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <h1 class="text-xl font-bold">Novo Pedido</h1>
        </header>

        <section class="neo-elevated bg-[#d0ccdc] rounded-2xl overflow-hidden">
            <div style="height:3px;background:var(--c-hidro)"></div>
            <div class="p-6 space-y-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background:var(--c-hidro-l)">
                        <span class="material-symbols-outlined" style="color:var(--c-hidro-tx)">psychology</span>
                    </div>
                    <div>
                        <h2 class="font-bold">Análise da IA</h2>
                        <p class="text-xs text-slate-500">Problema identificado com 98% de precisão</p>
                    </div>
                </div>
                <div class="neo-inset p-4 rounded-xl text-sm italic text-slate-600">
                    "O vazamento parece ser na junta principal do sifão. Recomenda-se um encanador especializado em reparos hidráulicos residenciais."
                </div>
                <div class="flex gap-2">
                    <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider" style="background:var(--c-hidro-l);color:var(--c-hidro-tx)">🔧 Hidráulica</span>
                    <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider bg-slate-200">Urgente</span>
                </div>
            </div>
        </section>

        <button class="w-full py-4 rounded-xl neo-elevated bg-[#d0ccdc] text-primary font-bold">Continuar</button>
    </div>
</body></html>
