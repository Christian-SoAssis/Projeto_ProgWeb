<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Solicitação de Serviço - Passo 2</title>
<!-- BEGIN: External Scripts -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            charcoal: '#121212',
            petrol: '#005F73',
            'petrol-light': '#008ba8',
            'neu-dark': '#0d0d0d',
            'neu-light': '#171717',
          },
          boxShadow: {
            'neu-inset': 'inset 6px 6px 12px #0a0a0a, inset -6px -6px 12px #1a1a1a',
            'neu-flat': '6px 6px 12px #0a0a0a, -6px -6px 12px #1a1a1a',
            'neu-pressed': 'inset 2px 2px 5px #0a0a0a, inset -2px -2px 5px #1a1a1a',
          }
        }
      }
    }
  </script>
<!-- END: External Scripts -->
<!-- BEGIN: Custom Neumorphic Styles -->
<style data-purpose="neumorphic-depth">
    .neu-recessed {
      background: #121212;
      box-shadow: inset 8px 8px 16px #0a0a0a, inset -8px -8px 16px #1a1a1a;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }
    .neu-extruded {
      background: #121212;
      box-shadow: 6px 6px 12px #0a0a0a, -6px -6px 12px #1a1a1a;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .neu-chip {
      background: #005F73;
      box-shadow: 4px 4px 8px #004655, -2px -2px 6px rgba(255,255,255,0.05);
      border: 1px solid rgba(0, 95, 115, 0.2);
    }
    .progress-track {
      background: #0d0d0d;
      box-shadow: inset 2px 2px 4px #000;
    }
    .progress-thumb {
      background: linear-gradient(90deg, #005F73 0%, #008ba8 100%);
      box-shadow: 0 0 10px rgba(0, 95, 115, 0.5);
    }
  </style>
<!-- END: Custom Neumorphic Styles -->
</head>
<body class="bg-charcoal text-gray-200 min-h-screen flex flex-col font-sans antialiased">
<!-- BEGIN: App Header -->
<header class="p-6 flex items-center justify-between" data-purpose="app-navigation">
<button aria-label="Voltar" class="w-10 h-10 rounded-full flex items-center justify-center neu-extruded hover:text-petrol transition-colors">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<h1 class="text-lg font-semibold tracking-tight">Nova Solicitação</h1>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</header>
<!-- END: App Header -->
<!-- BEGIN: Main Content -->
<main class="flex-grow container mx-auto px-6 pb-10 max-w-md flex flex-col">
<!-- BEGIN: Progress Indicator -->
<section class="mb-8" data-purpose="progress-container">
<div class="flex justify-between items-center mb-3 px-1">
<span class="text-xs uppercase tracking-widest text-petrol font-bold">Passo 2 de 3</span>
<span class="text-xs text-gray-500">Descreva o Problema</span>
</div>
<div class="h-2 w-full progress-track rounded-full overflow-hidden">
<div class="h-full progress-thumb rounded-full transition-all duration-700 ease-out" style="width: 66.6%;"></div>
</div>
</section>
<!-- END: Progress Indicator -->
<!-- BEGIN: Form Section -->
<section class="flex flex-col gap-8 flex-grow">
<!-- Section Title -->
<div data-purpose="section-header">
<h2 class="text-2xl font-light mb-2">Qual o <span class="font-bold text-white">problema?</span></h2>
<p class="text-gray-500 text-sm">Adicione fotos e detalhes para um orçamento mais preciso.</p>
</div>
<!-- BEGIN: Upload Area -->
<div class="neu-recessed rounded-[20px] p-10 flex flex-col items-center justify-center border-dashed border-2 border-transparent hover:border-petrol/30 transition-all duration-300 group cursor-pointer" data-purpose="media-upload-container" id="drop-zone">
<div class="w-16 h-16 neu-extruded rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
<svg class="h-8 w-8 text-petrol" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
<path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
</div>
<p class="text-sm font-medium text-gray-300">Arraste fotos ou clique aqui</p>
<p class="text-xs text-gray-500 mt-2">Máx. 5 arquivos (PNG, JPG)</p>
</div>
<!-- END: Upload Area -->
<!-- BEGIN: Classification Chips -->
<div class="flex flex-wrap gap-3" data-purpose="status-chips">
<!-- Specialty Chip -->
<div class="neu-chip px-4 py-2 rounded-full flex items-center gap-2 transition-transform active:scale-95 cursor-default">
<svg class="h-4 w-4" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] uppercase font-bold tracking-wider">Hidráulica</span>
</div>
<!-- Urgency Chip -->
<div class="neu-chip px-4 py-2 rounded-full flex items-center gap-2 transition-transform active:scale-95 cursor-default">
<svg class="h-4 w-4" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] uppercase font-bold tracking-wider">Alta Urgência</span>
</div>
<!-- Complexity Chip -->
<div class="neu-chip px-4 py-2 rounded-full flex items-center gap-2 transition-transform active:scale-95 cursor-default">
<svg class="h-4 w-4" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] uppercase font-bold tracking-wider">Complexidade Média</span>
</div>
</div>
<!-- END: Classification Chips -->
<!-- BEGIN: Description Input -->
<div class="space-y-3" data-purpose="text-input-group">
<label class="text-xs text-gray-400 ml-1" for="description">Detalhes Adicionais</label>
<textarea class="w-full neu-recessed rounded-[20px] border-0 focus:ring-1 focus:ring-petrol/50 text-gray-200 placeholder-gray-600 p-4 transition-all" id="description" placeholder="Ex: Torneira da cozinha pingando mesmo fechada..." rows="4"></textarea>
</div>
<!-- END: Description Input -->
</section>
<!-- END: Form Section -->
<!-- BEGIN: Action Footer -->
<footer class="mt-auto pt-8" data-purpose="form-actions">
<button class="w-full py-4 neu-extruded rounded-[20px] bg-petrol text-white font-bold tracking-wide flex items-center justify-center gap-3 active:shadow-neu-pressed transition-all duration-200 hover:bg-petrol-light">
        Próximo Passo
        <svg class="h-5 w-5" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" fill-rule="evenodd"></path>
</svg>
</button>
</footer>
<!-- END: Action Footer -->
</main>
<!-- END: Main Content -->
<!-- BEGIN: Scripts -->
<script data-purpose="interaction-handlers">
    // Simple visual feedback for the recessed area
    const dropZone = document.getElementById('drop-zone');
    
    dropZone.addEventListener('mousedown', () => {
      dropZone.style.boxShadow = 'inset 2px 2px 5px #0a0a0a, inset -2px -2px 5px #1a1a1a';
    });

    dropZone.addEventListener('mouseup', () => {
      dropZone.style.boxShadow = 'inset 8px 8px 16px #0a0a0a, inset -8px -8px 16px #1a1a1a';
    });

    // Touch support
    dropZone.addEventListener('touchstart', () => {
      dropZone.style.boxShadow = 'inset 2px 2px 5px #0a0a0a, inset -2px -2px 5px #1a1a1a';
    });

    dropZone.addEventListener('touchend', () => {
      dropZone.style.boxShadow = 'inset 8px 8px 16px #0a0a0a, inset -8px -8px 16px #1a1a1a';
    });
  </script>
<!-- END: Scripts -->
</body></html>
