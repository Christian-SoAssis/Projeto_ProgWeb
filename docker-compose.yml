services:
  db:
    build:
      context: .
      dockerfile: apps/db/Dockerfile
    container_name: servicoja-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-servicoja}
      POSTGRES_USER: ${DB_USER:-servicoja}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-servicoja_dev_2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-extensions.sql:/docker-entrypoint-initdb.d/01-extensions.sql:ro
    networks:
      - data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-servicoja} -d ${DB_NAME:-servicoja}" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: servicoja-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev_2026} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    networks:
      - data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_2026}", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: servicoja-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-servicoja}:${DB_PASSWORD:-servicoja_dev_2026}@db:5432/${DB_NAME:-servicoja}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_2026}@redis:6379/0
      UPLOADS_DIR: /app/uploads
      JWT_SECRET: ${JWT_SECRET:-jwt_super_secret_dev_key_change_in_production_2026}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      GOOGLE_API_KEY: AIzaSyB0b7F6xj5-14NBouRupB3K2vql1MAwdXU
      GEMINI_MODEL: gemini-1.5-flash
      OTEL_EXPORTER_OTLP_ENDPOINT: http://observability:4317
      OTEL_SERVICE_NAME: servicoja-api
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/api/v1/auth/google/callback}
      FRONTEND_AUTH_CALLBACK_URL: ${FRONTEND_AUTH_CALLBACK_URL:-http://localhost:3000/auth/callback}
    volumes:
      - ./apps/api:/app
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend
      - data
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: servicoja-pgadmin
    restart: unless-stopped
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-assis.christiansales@gmail.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-1234}
    volumes:
      - pgadmindata:/var/lib/pgadmin
    networks:
      - data
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: servicoja-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-8000}/api/v1
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY: ${MERCADOPAGO_PUBLIC_KEY:-}
      API_INTERNAL_URL: http://api:8000
      UPLOADS_URL: http://localhost:${API_PORT:-8000}/uploads
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      api:
        condition: service_healthy
    networks:
      - frontend
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:3000" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  observability:
    image: grafana/otel-lgtm:latest
    container_name: servicoja-observability
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    networks:
      - data
      - frontend

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  pgadmindata:
    driver: local

networks:
  frontend:
    driver: bridge
  data:
    driver: bridge
