name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Install dependencies
        run: npm install
        
      - name: Lint
        run: npm run lint
        
      - name: Type Check
        run: npx tsc --noEmit

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'apps/api/requirements.txt'
          
      - name: Install dependencies
        run: |
          cd apps/api
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Start Database and Redis
        run: |
          docker compose up -d db redis
          # Wait for services to become healthy
          echo "Waiting for PostgreSQL and Redis to be ready..."
          sleep 15
          
      - name: Run Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://servicoja:servicoja_dev_2026@localhost:5432/servicoja
          REDIS_URL: redis://:redis_dev_2026@localhost:6379/0
          JWT_SECRET: jwt_super_secret_dev_key_change_in_production_2026
          ENVIRONMENT: test
        run: |
          cd apps/api
          pytest
